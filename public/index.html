            const content = document.getElementById('addContent').value.trim();
            const detail = document.getElementById('addDetail').value.trim();
            const priority = document.getElementById('addPriority').value;
            const category = document.getElementById('addCategory').value;
            const dueDate = document.getElementById('addDueDate').value;
            const dueTime = document.getElementById('addDueTime').value;
            const repeatType = document.getElementById('addRepeat').value;
            const repeatValue = repeatType === 'weekly' ? document.getElementById('addWeeklyDay').value : '';
            const reminderEnabled = document.getElementById('addReminderEnabled').checked;
            const reminderDays = parseInt(document.getElementById('addReminderDays').value) || 0;
            const reminderHours = parseInt(document.getElementById('addReminderHours').value) || 0;

            if (!content) {
                showAlert('请输入任务内容', true);
                return;
            }

            // 构建提醒时间字符串（只有启用时才设置）
            let reminderTime = '';
            if (reminderEnabled) {
                if (reminderDays > 0) reminderTime += reminderDays + '天';
                if (reminderHours > 0) reminderTime += reminderHours + '小时';
            }

            try {
                if (taskId) {
                    // 编辑模式
                    await fetch(`/api/todos/${taskId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content,
                            detail,
                            priority,
                            category,
                            dueDate,
                            dueTime,
                            repeatType,
                            repeatValue,
                            reminderTime,
                            reminderDaysValue: reminderEnabled ? reminderDays : 0,
                            reminderHoursValue: reminderEnabled ? reminderHours : 0
                        })
                    });
                } else {
                    // 添加模式
                    await fetch('/api/todos', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            content,
                            detail,
                            priority,
                            category,
                            dueDate,
                            dueTime,
                            repeatType,
                            repeatValue,
                            reminderDaysValue: reminderEnabled ? reminderDays : 0,
                            reminderHoursValue: reminderEnabled ? reminderHours : 0,
                            reminderTime
                        })
                    });
                }

                closeAddTaskModal();
                loadTodos();
            } catch (error) {
                console.error('添加失败:', error);
                showAlert('添加失败: ' + error.message, true);
            }
        }

        // 设置提醒时间
        async function setReminder(hours) {
            try {
                await fetch('/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reminderHours: hours })
                });

                document.querySelectorAll('.reminder-option').forEach(opt => {
                    opt.classList.remove('active');
                    if (parseInt(opt.dataset.hours) === hours) {
                        opt.classList.add('active');
                    }
                });

                showAlert('提醒时间已设置为 ' + (hours < 24 ? hours + '小时' : (hours/24) + '天') + '前');
            } catch (error) {
                console.error('设置提醒失败:', error);
            }
        }

        // 添加分类
        // 添加新分类（在列表末尾添加一行输入框）
        function addCategory() {
            const list = document.getElementById('categoryList');
            const newId = 'new-category-' + Date.now();
            const newRow = document.createElement('div');
            newRow.className = 'category-item';
            newRow.id = newId;
            newRow.innerHTML = `
                <input type="text" id="${newId}-input" placeholder="输入新分类名称" style="flex:1">
                <button class="btn-category btn-category-edit" onclick="saveNewCategory('${newId}')">保存</button>
                <button class="btn-category btn-category-delete" onclick="this.parentElement.remove()">取消</button>
            `;
            list.appendChild(newRow);
            document.getElementById(newId + '-input').focus();
        }

        // 保存新分类
        async function saveNewCategory(newId) {
            const name = document.getElementById(newId + '-input').value.trim();
            if (!name) {
                showAlert('请输入分类名称', true);
                return;
            }

            try {
                const res = await fetch('/api/categories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await res.json();
                if (!res.ok) {
                    showAlert(data.error || '添加失败', true);
                    return;
                }

                // 更新本地分类列表并重新渲染
                categories = data.categories;
                renderCategories(categories);
                updateCategoryDropdowns();
                showAlert('分类添加成功！');
            } catch (error) {
                console.error('添加分类失败:', error);
                showAlert('添加分类失败: ' + error.message, true);
            }
        }

        // 更新分类
        async function updateCategory(oldName) {
            const newName = document.getElementById(`category-input-${oldName}`).value.trim();
            if (!newName || newName === oldName) return;

            try {
                const res = await fetch(`/api/categories/${oldName}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });

                const data = await res.json();
                if (!res.ok) {
                    showAlert(data.error || '更新失败', true);
                    return;
                }

                // 更新本地分类列表
                categories = data.categories;
                renderCategories(categories);
                updateCategoryDropdowns();
                renderTodos();
                renderCalendar();
                showAlert('分类更新成功！');
            } catch (error) {
                console.error('更新分类失败:', error);
                showAlert('更新分类失败: ' + error.message, true);
            }
        }

        // 删除分类
        async function deleteCategory(name) {
            if (!await showConfirm(`确定要删除分类"${name}"吗？该分类下的任务将改为"其他"`)) return;

            try {
                const res = await fetch(`/api/categories/${name}`, {
                    method: 'DELETE'
                });

                const data = await res.json();
                if (!res.ok) {
                    showAlert(data.error || '删除失败', true);
                    return;
                }

                // 更新本地分类列表
                categories = data.categories;
                renderCategories(categories);
                updateCategoryDropdowns();
                loadTodos();
                showAlert('分类删除成功！');
            } catch (error) {
                console.error('删除分类失败:', error);
                showAlert('删除分类失败: ' + error.message, true);
            }
        }

        // 显示任务详情
        let currentDetailId = null;

        function showTaskDetail(id) {
            const todo = todos.find(t => t['ID'] === id);
            if (!todo) return;

            currentDetailId = id;
            const completed = todo['完成状态'] === '是';
            const overdue = !completed && isOverdue(todo['截止日期'], todo['截止时间']);
            const priority = todo['优先级'] || '中';
            const timeDisplay = todo['截止时间'] ? todo['截止时间'].substring(0, 5) : '未设置';

            document.getElementById('taskDetailContent').innerHTML = `
                <div class="detail-row">
                    <span class="detail-label">任务内容</span>
                    <span class="detail-value" style="font-weight:600">${escapeHtml(todo['任务内容'])}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">状态</span>
                    <span class="detail-value ${completed ? '' : overdue ? 'overdue' : ''}">${completed ? '已完成' : overdue ? '已逾期' : '待完成'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">优先级</span>
                    <span class="detail-value priority-${priority === '高' ? 'high' : priority === '中' ? 'medium' : 'low'}">${priority}优先级</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">分类</span>
                    <span class="detail-value">${todo['分类'] || '其他'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">截止日期</span>
                    <span class="detail-value ${overdue ? 'overdue' : ''}">${todo['截止日期'] || '未设置'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">截止时间</span>
                    <span class="detail-value">${timeDisplay}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">提醒时间</span>
                    <span class="detail-value">${todo['提醒时间'] || '未设置'}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">创建时间</span>
                    <span class="detail-value">${todo['创建时间'] || '未知'}</span>
                </div>
                ${todo['完成时间'] ? `
                <div class="detail-row">
                    <span class="detail-label">完成时间</span>
                    <span class="detail-value">${todo['完成时间']}</span>
                </div>
                ` : ''}
            `;

            document.getElementById('taskDetailModal').classList.add('active');
        }

        // 关闭任务详情
        function closeTaskDetail() {
            document.getElementById('taskDetailModal').classList.remove('active');
            currentDetailId = null;
        }

        // 从详情页编辑
        function editFromDetail() {
            if (currentDetailId) {
                closeTaskDetail();
                switchView('list');
                setTimeout(() => editTodo(currentDetailId), 100);
            }
        }

        // 从详情页删除
        async function deleteFromDetail() {
            if (currentDetailId && await showConfirm('确定要删除这个任务吗？')) {
                deleteTodo(currentDetailId);
                closeTaskDetail();
            }
        }
    </script>
</body>
</html>
